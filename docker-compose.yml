version: '3.9'
services:

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes: ["./backend:/app"]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes: ["./frontend:/app", "/app/node_modules"]
    command: npm run dev

  celery_worker:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes: ["./backend:/app"]
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  celery_beat:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes: ["./backend:/app"]
    command: celery -A tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    restart: unless-stopped

  flower:
    build: ./backend
    ports: ["5555:5555"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes: ["./backend:/app"]
    command: celery -A tasks.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-dropship}

volumes:
  redis_data:
