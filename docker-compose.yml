services:
  api:
    build: .
    image: dropship-app
    ports: ["8003:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dropship_user:0b8ad846a1bef653c3aef0304dc78eae@shared-postgres:5432/dropship
      REDIS_URL: redis://shared-redis:6379/0
    depends_on:
      - worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - default
      - shared

  worker:
    image: dropship-app
    command: celery -A core.celery_app worker --beat --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dropship_user:0b8ad846a1bef653c3aef0304dc78eae@shared-postgres:5432/dropship
      REDIS_URL: redis://shared-redis:6379/0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - default
      - shared

  frontend:
    build: ./frontend
    image: dropship-frontend
    ports: ["3001:3000"]
    env_file: ./frontend/.env.local
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  default:
  shared:
    external: true
